<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Winnipeg Jets Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #041E42;
    color: white;
    text-align: center;
}

header {
    padding: 40px 0;
    font-size: 2.5rem;
    font-weight: bold;
    background: #004C97;
    color: white;
}

.container {
    margin-top: 50px;
}

.nav-button {
    display: block;
    width: 250px;
    margin: 15px auto;
    padding: 15px;
    font-size: 1.3rem;
    background: #C8102E;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.25s;
}

.nav-button:hover {
    background: #A2AAAD;
    color: #041E42;
    transform: scale(1.05);
}
</style>
</head>

<body>

<header>Winnipeg Jets Hub</header>

<div class="container">
    <button class="nav-button" onclick="location.href='hub.html#roster'">Roster</button>
    <button class="nav-button" onclick="location.href='hub.html#news'">News</button>
    <button class="nav-button" onclick="location.href='hub.html#schedule'">Schedule</button>
    <button class="nav-button" onclick="location.href='hub.html#results'">Results</button>
    <button class="nav-button" onclick="location.href='hub.html#trades'">Trades</button>
    <button class="nav-button" onclick="location.href='hub.html#stats'">Stats</button>
</div>

</body>
</html>
